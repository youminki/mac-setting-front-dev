# ── 기본 ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",ghostty:RGB"
set -sg escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-passthrough on

# ── 마우스 / 히스토리 ──────────────────────────────────
set -g mouse on
set -g history-limit 100000

# ── Prefix: Ctrl+A ─────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── 설정 리로드 ────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "✓ tmux.conf reloaded"

# ── 패널 분할 (현재 경로 유지) ──────────────────────────
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── 복사 모드: vi ──────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ── 상태바 (Dracula) ───────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#282a36,fg=#f8f8f2"

set -g status-left-length 40
set -g status-left "#[bg=#bd93f9,fg=#282a36,bold] #S #[bg=#282a36,fg=#bd93f9]"

set -g status-right-length 60
set -g status-right "#[fg=#50fa7b]  #(cd #{pane_current_path} && git branch --show-current 2>/dev/null)  #[fg=#f8f8f2]%H:%M"

setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bg=#44475a,fg=#f8f8f2,bold] #I:#W "

# ── 패널 테두리 ────────────────────────────────────────
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"
